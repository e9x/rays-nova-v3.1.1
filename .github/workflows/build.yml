on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    name: Build ${{ matrix.name }} Installer
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            target: --linux
            artifact_name: rays-nova-linux-installer
            artifact_paths: |
              dist/*.AppImage
              dist/latest-linux.yml
          - os: windows-latest
            name: Windows
            target: --win
            artifact_name: rays-nova-windows-installer
            artifact_paths: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest.yml
          - os: macos-latest
            name: macOS
            target: --mac --x64 --arm64
            artifact_name: rays-nova-macos-installer
            artifact_paths: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/*.zip
              dist/latest-mac.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install g++-multilib
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install g++-multilib
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Generate build info
        run: node buildinfo.js
      - name: Transpile
        run: npm run transpile
      - name: Build ${{ matrix.name }} installer
        run: npx electron-builder ${{ matrix.target }} --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: ignore