on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    permissions:
      contents: write
    name: Build
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_args: --linux
          - os: windows-latest
            build_args: --win
          - os: macos-latest
            build_args: --mac --x64 --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install g++-multilib
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install g++-multilib
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Generate build info
        run: node buildinfo.js
      - name: Transpile
        run: npm run transpile
      - name: Build
        run: npx electron-builder ${{ matrix.build_args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}